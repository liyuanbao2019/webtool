# 数据库配置（SQL 执行器）支持 Oracle、达梦、MySQL
oracle:
  # 连接池配置
  pool:
    maximum-pool-size: 10         # 每个数据源最大连接数（并发SQL较多时建议适当提高）
    minimum-idle: 2               # 最小空闲连接数
    connection-timeout: 120000    # 从连接池获取连接超时（毫秒）
    idle-timeout: 600000          # 空闲连接超时（10分钟）
    max-lifetime: 1800000         # 连接最大生命周期（30分钟）
  
  # 查询保护配置（防止OOM和慢查询）
  query:
    max-query-timeout: 300        # 查询超时时间（秒）
    fetch-size: 500               # 每次从数据库fetch的行数
    
