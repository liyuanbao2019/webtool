# SSH性能配置
ssh:
  max-connections: 100     # 最大并发SSH连接数
  connection-timeout: 60000  # 连接超时时间（毫秒）
  keepalive-interval: 60   # 保活间隔时间（秒），定期发送换行符防止超时
spring:
  mvc:
    async:
      request-timeout: -1 # 禁用异步请求超时，防止大文件下载被Spring中断
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  # 禁用Thymeleaf模板缓存（开发环境）
  thymeleaf:
    cache: false
  # 禁用静态资源缓存
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
          no-store: true

app:
  servers-config-file: servers.xlsx
  default-group-name: Default Group
  common-websites-enabled: true
