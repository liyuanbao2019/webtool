# 审计日志配置
audit:
  # SQL审计
  log:
    directory: ./logs/sql_audit  # SQL审计日志目录

  # SSH审计
  ssh:
    enabled: true                  # 是否启用SSH审计
    directory: ./logs/ssh_audit    # SSH审计日志目录
    log-commands: true             # 是否记录用户命令详情
    dangerous-command-confirm: true # 是否对危险命令进行二次确认
    dangerous-commands:            # 危险命令列表（需要二次确认）
      - rm
      - rmdir
      - dd
      - mkfs
      - fdisk
      - parted
      - shutdown
      - reboot
      - halt
      - poweroff
      - init
      # - kill
      # - pkill
      # - killall
    # 脚本执行安全扫描配置
    script-scan-enabled: true       # 是否启用脚本执行安全扫描
    block-critical-script-ops: true # 是否阻断极高危脚本操作（极高危直接阻断，不给确认机会）
    script-exec-triggers:          # 脚本执行触发命令（检测到这些命令时进行脚本内容扫描）
      - sh
      - bash
      - zsh
      - dash
      - ksh
      - source
      - .

# 安全防护配置
security:
  # CSRF防护
  csrf:
    enabled: true
    token-timeout: 1800  # Token有效期（秒，30分钟）
    
  # 请求限流
  rate-limit:
    enabled: true
    per-user: 60         # 每用户每分钟请求数（平均1秒1次）
    per-ip: 100          # 每IP每分钟请求数
    
  # SQL安全检查
  sql-check:
    enabled: true
    block-keywords:      # 危险关键词黑名单
      - DROP
      - TRUNCATE
      - ALTER TABLE
      # - CREATE USER
      # - GRANT
      # - REVOKE
    admin-users:         # 管理员白名单（可执行危险SQL）
      - jkyw
      
  # 来源验证
  origin-check:
    enabled: false       # 暂不启用，避免影响现有功能
    allowed-origins:
      - http://localhost:9090
      - http://127.0.0.1:9090

# 日志配置
logging:
  level:
    com.gxcj.xjtool.service.impl.SshServiceImpl: DEBUG
